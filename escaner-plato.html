<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner de Plato · NutriPlan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080e1a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--accent2:#818cf8; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:0 0 40px}
  .header{background:linear-gradient(90deg,#0c1829,#0a1020);border-bottom:1px solid var(--border);padding:20px 18px 14px;text-align:center}
  .eyebrow{font-family:'DM Mono',monospace;font-size:0.625rem;letter-spacing:5px;color:var(--muted);margin-bottom:6px}
  .title{font-family:'DM Serif Display',serif;font-size:1.5rem;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .pad{padding:16px}
  .upload-area{border:2px dashed var(--border);border-radius:16px;padding:32px 16px;text-align:center;cursor:pointer;background:var(--card);transition:all 0.2s;margin-bottom:14px}
  .upload-area:hover{border-color:var(--accent);background:rgba(56,189,248,0.04)}
  #preview{display:none;max-width:100%;border-radius:12px;max-height:260px;object-fit:cover;margin-top:12px}
  .btn-row{display:flex;gap:10px;margin-bottom:14px}
  .btn{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:600;cursor:pointer;transition:all 0.2s}
  .btn:hover{background:rgba(255,255,255,0.08)}
  .btn-primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);border:none;border-radius:12px;padding:14px;width:100%;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:16px;display:none}
  .loading{display:none;text-align:center;padding:32px}
  .result{display:none}
  .card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
  .card-label{font-family:'DM Mono',monospace;font-size:0.625rem;letter-spacing:3px;color:var(--muted);margin-bottom:8px}
  .dish-name{font-size:1.125rem;font-weight:700;color:var(--text);margin-bottom:12px}
  .macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .macro{border-radius:10px;padding:10px;text-align:center}
  .macro-val{font-family:'DM Serif Display',serif;font-size:1.375rem}
  .macro-lbl{font-family:'DM Mono',monospace;font-size:0.5625rem;color:var(--muted);letter-spacing:1px}
  .ing-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.8125rem}
  .ing-item:last-child{border-bottom:none}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .notes{font-size:0.875rem;color:var(--text);line-height:1.6}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#e2e8f0;padding:10px 20px;border-radius:12px;font-size:0.875rem;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div class="eyebrow">ANÁLISIS NUTRICIONAL</div>
  <div class="title">📷 Escáner de Plato</div>
</div>

<div class="pad">
  <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
    <div id="placeholder">
      <div style="font-size:3rem;margin-bottom:8px">🍽️</div>
      <div style="font-size:1rem;font-weight:600;margin-bottom:4px">Subí una foto del plato</div>
      <div style="font-size:0.75rem;color:var(--muted)">Tocá para elegir desde galería</div>
    </div>
    <img id="preview">
  </div>

  <div class="btn-row">
    <button class="btn" onclick="document.getElementById('camera-input').click()">📷 Cámara</button>
    <button class="btn" onclick="document.getElementById('file-input').click()">🖼️ Galería</button>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadImage(event)">
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="loadImage(event)">

  <button class="btn-primary" id="analyze-btn" onclick="analyze()">🔍 Analizar con IA</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:0.9rem;color:var(--muted)">Analizando el plato...</div>
  </div>

  <div class="result" id="result">
    <div class="card">
      <div class="card-label">PLATO DETECTADO</div>
      <div class="dish-name" id="dish-name"></div>
      <div class="macros">
        <div class="macro" style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2)">
          <div class="macro-val" id="r-kcal" style="color:#38bdf8">—</div>
          <div class="macro-lbl">KCAL</div>
        </div>
        <div class="macro" style="background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2)">
          <div class="macro-val" id="r-prot" style="color:#a78bfa">—</div>
          <div class="macro-lbl">PROTEÍNA</div>
        </div>
        <div class="macro" style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2)">
          <div class="macro-val" id="r-iron" style="color:#f87171">—</div>
          <div class="macro-lbl">HIERRO</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">INGREDIENTES DETECTADOS</div>
      <div id="r-ings"></div>
    </div>

    <div class="card">
      <div class="card-label">OBSERVACIONES</div>
      <div class="notes" id="r-notes"></div>
    </div>

    <button class="btn" style="width:100%" onclick="reset()">📷 Escanear otro plato</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let imgBase64 = null, imgType = 'image/jpeg';

function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  imgType = ['image/jpeg','image/png','image/gif','image/webp'].includes(file.type) ? file.type : 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    imgBase64 = ev.target.result.split(',')[1];
    document.getElementById('preview').src = ev.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('analyze-btn').style.display = 'block';
    document.getElementById('result').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyze() {
  if (!imgBase64) { toast('⚠️ Primero elegí una foto'); return; }
  document.getElementById('analyze-btn').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imgType, data: imgBase64 } },
            { type: 'text', text: 'Analizá esta foto de comida y respondé SOLO con JSON válido, sin texto extra ni backticks. Formato exacto:\n{"nombre":"nombre del plato en español","kcal":número,"proteina_g":número,"hierro_mg":número,"ingredientes":["ingrediente 1","ingrediente 2"],"observaciones":"breve consejo nutricional en español de 1-2 oraciones"}\nEstimá las calorías, proteínas (gramos) y hierro (mg) de forma realista según lo que se ve en la imagen.' }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err?.error?.message || `Error HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = (data.content||[]).map(i=>i.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    showResult(JSON.parse(clean));
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyze-btn').style.display = 'block';
    toast('⚠️ ' + (err.message || 'Error al analizar'));
  }
}

function showResult(r) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dish-name').textContent = r.nombre || 'Plato detectado';
  document.getElementById('r-kcal').textContent = r.kcal ?? '—';
  document.getElementById('r-prot').textContent = r.proteina_g != null ? r.proteina_g+'g' : '—';
  document.getElementById('r-iron').textContent = r.hierro_mg != null ? r.hierro_mg+'mg' : '—';
  document.getElementById('r-ings').innerHTML = (r.ingredientes||[]).map(i=>
    `<div class="ing-item"><span class="dot"></span>${i}</div>`
  ).join('') || '<div style="color:var(--muted);font-size:0.8125rem">No detectados</div>';
  document.getElementById('r-notes').textContent = r.observaciones || '';
  document.getElementById('result').style.display = 'block';
}

function reset() {
  imgBase64 = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('preview').src = '';
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('analyze-btn').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('camera-input').value = '';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
